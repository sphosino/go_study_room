{% extends "base.html" %}

{% block header %}
	<meta name="csrf-token" content = "{{csrf_token}}">

	{% load static %}
		<link rel="stylesheet" href = "{% static 'chat/css/room.css' %}">
		<script> window.roomid = parseInt("{{ room.id }}"); </script>
		<script src="{% static 'chat/js/room.js' %}?v={% now 'U' %}" type = "module"></script>
	{% endblock %}


{% block body %}

	<div class = "flex gap-6 md:flex-row flex-col mx-auto w-fit">
		<div class="flex-none w-auto min-w-0">
			<h2>【{{ room.id }}番部屋  {{room.name}}】 {{user.account_id}} </h2>
			{% include 'chat.html' %}
			{% include 'userlist.html' %}
		</div>

		<div id = "board-main" class="flex-none w-auto">
			<div id = "position"></div>
			<div id = "captures"></div>
			<button type = "button" id = "makeboard">碁盤作成</button>
			<div id="board-mode-controls" class="board-mode-controls">
				<button type="button" id="board-mode-alternating" data-board-mode="alternating">交互着手</button>
				<button type="button" id="board-mode-setup-black" data-board-mode="setup_black">置き石 黒</button>
				<button type="button" id="board-mode-setup-white" data-board-mode="setup_white">置き石 白</button>
				<button type="button" id="board-mode-remove-stone" data-board-mode="remove_stone">1個削除</button>
				<button type="button" id="board-mode-remove-group" data-board-mode="remove_group">連削除</button>
				<button type="button" id="board-undo">1手戻す</button>
				<button type="button" id="board-redo">やり直す</button>
				<div id="board-mode-label" class="board-mode-label">現在のモード: 交互着手</div>
			</div>
			<dialog id = "make-board-modal">
				<p>碁盤のサイズを決めてね</p>
				<form method = "dialog" id = "make-board-form">
					<label for = "input-boardx">横</label><input type="number" id="input-boardx" min="1" max="19" value = "13">
					<label for = "input-boardy">縦</label><input type="number" id="input-boardy" min="1" max="19" value = "13">
					<div class="flex justify-end gap-3">
						<button value = "make-board-submit" form = "make-board-form">作成！</button>
						<button value = "make-board-cancel">閉じる</button>
					</div>
				</form>
			</dialog>
			<div id = "board"></div>
			<div>
				<h1>WebRTC P2P </h1>
				<audio id = "remoteAudio" controls autoplay></audio>
				<button id = 'myvoice-toggle'>自分の音声のミュート切り替え</button>
			</div>
		</div>
	</div>

	<div><a href = "{% url 'chat:lobby' %}">ロビーに戻る</a></div>

{% endblock %}
